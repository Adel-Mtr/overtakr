services:
  - type: web
    name: overtakr-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
